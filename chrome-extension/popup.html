<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Scam Text Scanner</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,200..800;1,6..72,200..800&display=swap" rel="stylesheet">

    <style>
      body {
        width: 360px;
        padding: 22px;
        margin: 0;
        font-family: "Newsreader", serif;
        background: linear-gradient(145deg, #0a132e, #091020 85%);
        color: #e9f1ff;
        border-radius: 18px;
        display: flex;
        flex-direction: column;
        align-items: center;
        text-align: center;
        min-height: 420px;
        box-shadow: 0 0 25px rgba(0, 60, 150, 0.4);
        overflow: hidden;
      }

      h3 {
        font-size: 1.5em;
        color: #fc7070;
        margin-bottom: 18px;
        text-shadow: 0 0 12px rgba(120, 170, 255, 0.4);
        letter-spacing: 0.5px;
      }

      textarea {
        width: 90%;
        height: 130px;
        border: 1px solid rgba(130, 160, 255, 0.2);
        border-radius: 14px;
        padding: 14px;
        resize: none;
        font-size: 14px;
        font-family: inherit;
        color: #f0f5ff;
        background: rgba(255, 255, 255, 0.06);
        outline: none;
        backdrop-filter: blur(8px);
        transition: all 0.3s ease;
      }

      textarea::placeholder {
        color: #9fb7ff;
      }

      textarea:focus {
        background: rgba(255, 255, 255, 0.1);
        box-shadow: 0 0 20px rgba(0, 122, 255, 0.3);
        border-color: rgba(0, 140, 255, 0.4);
        transform: scale(1.02);
      }

      button {
        margin-top: 18px;
        width: 80%;
        padding: 13px;
        border: none;
        border-radius: 0.5rem;
        background: linear-gradient(120deg, #009696, #00ffff);
        color: #fff;
        font-size: 15px;
        font-weight: 600;
        letter-spacing: 0.3px;
        cursor: pointer;
        box-shadow: 0 4px 20px rgba(0, 140, 255, 0.3);
        transition: all 0.3s ease;
      }

      button:hover {
        transform: translateY(-2px) scale(1.04);
        box-shadow: 0 6px 25px rgba(0, 160, 255, 0.5);
      }

      .result {
        margin-top: 22px;
        width: 90%;
        background: rgba(255, 255, 255, 0.04);
        border-radius: 14px;
        border: 1px solid rgba(140, 160, 255, 0.15);
        padding: 14px;
        backdrop-filter: blur(12px);
        box-shadow: inset 0 0 10px rgba(0, 120, 255, 0.15);
        text-align: left;
      }

      .result p {
        margin: 8px 0;
        font-size: 14px;
        line-height: 1.4;
        color: #d7e1ff;
      }

      #prediction {
        color: #00e0ff;
        font-weight: 600;
      }

      #confidence {
        color: #9dbdff;
      }

      @keyframes soft-glow {
        0% {
          box-shadow: 0 0 25px rgba(0, 120, 255, 0.25);
        }
        50% {
          box-shadow: 0 0 40px rgba(0, 160, 255, 0.45);
        }
        100% {
          box-shadow: 0 0 25px rgba(0, 120, 255, 0.25);
        }
      }

      body {
        animation: soft-glow 6s ease-in-out infinite alternate;
      }
    </style>
  </head>

  <body>
    <h3>🛡️Scam Text Scanner</h3>
    <textarea id="inputText" placeholder="Paste or type text to analyze..."></textarea>
    <button id="scanButton">Analyze Text</button>

    <div class="result">
      <p><strong>Prediction:</strong> <span id="prediction"></span></p>
      <p><strong>Confidence:</strong> <span id="confidence"></span></p>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
